services:
  ikhlas-impact-tracker:
    container_name: ikhlas-impact-tracker
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3088:3088"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./imports:/app/imports
      - ./logs:/app/logs
    restart: unless-stopped
    labels:
      net.unraid.docker.webui: "http://[IP]:3088"
      net.unraid.docker.icon: "https://raw.githubusercontent.com/walkxcode/dashboard-icons/main/png/mosque.png"
      net.unraid.docker.managed: "true"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
